<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JV-60FPS — 120 FPS Crack</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

        :root {
            --cyan: #25F4EE;
            --red: #FE2C55;
            --bg: #0b0c10;
            --card: #13151a;
            --border: rgba(255,255,255,0.07);
            --text: #e8eaf0;
            --dim: #6b7280;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(37,244,238,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(254,44,85,0.06) 0%, transparent 60%);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
            pointer-events: none;
            z-index: 0;
        }

        .wrapper { width: 100%; max-width: 460px; position: relative; z-index: 1; }

        /* ── LOCK SCREEN ── */
        #lockScreen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(37,244,238,0.07) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(254,44,85,0.07) 0%, transparent 60%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 24px;
        }

        #lockScreen.hidden { display: none; }

        .lock-card {
            width: 100%;
            max-width: 400px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            box-shadow: 0 8px 50px rgba(0,0,0,0.6);
            animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .lock-logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid var(--cyan);
            box-shadow: 0 0 25px rgba(37,244,238,0.4);
            object-fit: cover;
            object-position: top;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%,100% { box-shadow: 0 0 20px rgba(37,244,238,0.35); }
            50%      { box-shadow: 0 0 40px rgba(37,244,238,0.65); }
        }

        .lock-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 3px;
            color: var(--cyan);
            text-shadow: 0 0 20px rgba(37,244,238,0.4);
        }

        .lock-sub {
            font-size: 10px;
            color: var(--dim);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: -10px;
        }

        .lock-divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(37,244,238,0.25), transparent);
        }

        #idInput {
            width: 100%;
            padding: 13px 16px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(37,244,238,0.2);
            border-radius: 10px;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            letter-spacing: 1px;
            outline: none;
            text-align: center;
            transition: border 0.3s, box-shadow 0.3s;
        }

        #idInput::placeholder { color: rgba(107,114,128,0.8); }
        #idInput:focus { border-color: var(--cyan); box-shadow: 0 0 15px rgba(37,244,238,0.2); }

        #lockError {
            font-size: 10px;
            color: var(--red);
            letter-spacing: 1px;
            text-align: center;
            min-height: 16px;
            font-weight: 700;
        }

        .lock-btn {
            width: 100%;
            padding: 13px;
            border-radius: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
            text-decoration: none;
            display: block;
            border: none;
        }

        #unlockBtn {
            background: rgba(37,244,238,0.1);
            border: 1px solid rgba(37,244,238,0.5);
            color: var(--cyan);
            box-shadow: 0 0 15px rgba(37,244,238,0.1);
        }

        #unlockBtn:hover:not(:disabled) {
            background: rgba(37,244,238,0.18);
            box-shadow: 0 0 25px rgba(37,244,238,0.3);
            transform: translateY(-1px);
        }

        #unlockBtn:disabled { opacity: 0.6; cursor: not-allowed; }

        #joinBtn {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--dim);
        }

        #joinBtn:hover {
            border-color: rgba(37,244,238,0.3);
            color: #fff;
            transform: translateY(-1px);
        }

        /* ── MAIN CONTENT ── */
        .header { text-align: center; margin-bottom: 22px; }

        .logo-img {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 2px solid var(--cyan);
            box-shadow: 0 0 20px rgba(37,244,238,0.35);
            object-fit: cover;
            object-position: top;
            animation: pulse 3s ease-in-out infinite;
            display: block;
            margin: 0 auto 14px;
        }

        .site-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--dim);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .page-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .page-title .c { color: var(--cyan); text-shadow: 0 0 20px rgba(37,244,238,0.5); }
        .page-title .r { color: var(--red);  text-shadow: 0 0 20px rgba(254,44,85,0.5); }

        .page-sub {
            font-size: 10px;
            color: var(--dim);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 6px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
        }

        .upload-zone {
            border: 1.5px dashed rgba(37,244,238,0.4);
            border-radius: 12px;
            background: rgba(37,244,238,0.03);
            padding: 28px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .upload-zone:hover, .upload-zone.has-file {
            border-color: var(--cyan);
            background: rgba(37,244,238,0.06);
        }

        .upload-icon { color: var(--cyan); filter: drop-shadow(0 0 8px rgba(37,244,238,0.6)); }

        .upload-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.55);
        }

        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .stat {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            position: relative;
            overflow: hidden;
        }

        .stat::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 3px; height: 100%;
            background: var(--cyan);
            opacity: 0.4;
        }

        .stat-label { font-size: 9px; letter-spacing: 2px; color: var(--dim); text-transform: uppercase; margin-bottom: 5px; }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: var(--cyan);
            letter-spacing: 1px;
        }

        .terminal {
            background: #080a0d;
            border: 1px solid rgba(37,244,238,0.12);
            border-radius: 10px;
            padding: 12px 14px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            color: rgba(255,255,255,0.45);
            min-height: 80px;
            max-height: 110px;
            overflow-y: auto;
            line-height: 1.8;
        }

        .terminal::-webkit-scrollbar { width: 3px; }
        .terminal::-webkit-scrollbar-thumb { background: rgba(37,244,238,0.25); border-radius: 3px; }
        .terminal .hl  { color: var(--cyan); }
        .terminal .suc { color: #34d399; }
        .terminal .err { color: var(--red); }

        .cursor {
            display: inline-block;
            width: 7px; height: 12px;
            background: var(--cyan);
            vertical-align: middle;
            margin-left: 2px;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03);
            color: rgba(255,255,255,0.2);
            cursor: not-allowed;
            transition: all 0.25s ease;
        }

        .btn.ready {
            background: rgba(37,244,238,0.08);
            border-color: rgba(37,244,238,0.5);
            color: var(--cyan);
            cursor: pointer;
            box-shadow: 0 0 20px rgba(37,244,238,0.1);
        }

        .btn.ready:hover {
            background: rgba(37,244,238,0.15);
            box-shadow: 0 0 30px rgba(37,244,238,0.25);
            transform: translateY(-1px);
        }

        .divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(37,244,238,0.2), transparent); }

        .footer {
            text-align: center;
            font-size: 9px;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.15);
            text-transform: uppercase;
            margin-top: 14px;
        }
    </style>
</head>

<script>
    // ─────────────────────────────────────────
    // AUTH SYSTEM (same as extension, uses localStorage)
    // ─────────────────────────────────────────
    const VERIFY_URL = "https://mybot-2-bxxh.onrender.com/verify";

    function getBrowserToken() {
        let token = localStorage.getItem('jvBrowserToken');
        if (!token) {
            token = 'br_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
            localStorage.setItem('jvBrowserToken', token);
        }
        return token;
    }

    async function validateApiKey(apiKey) {
        if (!/^\d{5,15}$/.test(apiKey)) return { valid: false, reason: "invalid_format" };
        try {
            const token = getBrowserToken();
            const r = await fetch(`${VERIFY_URL}/${apiKey}/${token}`);
            const d = await r.json();
            if (d.allowed) return { valid: true, username: d.username || "User" };
            return { valid: false, reason: d.reason || "denied" };
        } catch(e) {
            return { valid: false, reason: "network_error" };
        }
    }

    const lockScreen = document.getElementById('lockScreen');
    const idInput    = document.getElementById('idInput');
    const unlockBtn  = document.getElementById('unlockBtn');
    const lockError  = document.getElementById('lockError');

    const unlock = () => lockScreen.classList.add('hidden');

    // Auto-unlock if already saved
    (async () => {
        const saved = localStorage.getItem('jvApiKey');
        const wasUnlocked = localStorage.getItem('jvUnlocked');
        if (wasUnlocked === 'true' && saved) {
            const result = await validateApiKey(saved);
            if (result.valid) {
                unlock();
            } else {
                localStorage.removeItem('jvUnlocked');
                localStorage.removeItem('jvApiKey');
                if (result.reason === 'session_taken') {
                    lockError.style.color = '#FE2C55';
                    lockError.textContent = '🚫 YOU ARE ALREADY LOGDIN RESAT THE EXTENSION FIRST';
                }
            }
        }
    })();

    unlockBtn.addEventListener('click', async () => {
        const entered = idInput.value.trim();
        if (!entered) return;

        unlockBtn.textContent = 'CHECKING...';
        unlockBtn.disabled = true;
        lockError.textContent = '';

        const result = await validateApiKey(entered);

        unlockBtn.textContent = '▶ Unlock';
        unlockBtn.disabled = false;

        if (result.valid) {
            localStorage.setItem('jvUnlocked', 'true');
            localStorage.setItem('jvApiKey', entered);
            lockError.style.color = '#25F4EE';
            lockError.textContent = '✓ Welcome ' + result.username;
            setTimeout(() => unlock(), 700);
        } else {
            const msgs = {
                invalid_format: '🚫 USE THE API TOKEN FROM BOT',
                not_member:     '🚫JOIN CHANNEL FIRST',
                blocked:        '🚫 ILLEGAL ACTIVITY DETECTED ',
                bot_error:      '🚫 ERROR CLEAR THE BOT HISTORY AND TRY AGAIN',
                network_error:  '🚫 NETWORK ERROR',
                session_taken:  '🚫 YOU ARE ALREADY LOGDIN RESAT THE EXTENSION FIRST',
                denied:         '🚫 ACCESS DINED',
            };
            lockError.style.color = '#FE2C55';
            lockError.textContent = msgs[result.reason] || '🚫 INVALID ID';
            idInput.style.borderColor = '#FE2C55';
            idInput.style.boxShadow = '0 0 12px rgba(254,44,85,0.3)';
            setTimeout(() => {
                idInput.style.borderColor = '';
                idInput.style.boxShadow = '';
            }, 1500);
        }
    });

    idInput.addEventListener('keydown', e => { if (e.key === 'Enter') unlockBtn.click(); });

    // ─────────────────────────────────────────
    // 120 FPS BYPASS ENGINE
    // ─────────────────────────────────────────
    const uploadZone  = document.getElementById('uploadZone');
    const fileInput   = document.getElementById('fileInput');
    const uploadLabel = document.getElementById('uploadLabel');
    const startBtn    = document.getElementById('startBtn');
    const console_    = document.getElementById('console');

    let selectedFile = null;
    let typing = false;

    const delay = ms => new Promise(r => setTimeout(r, ms));

    async function log(msg, type = '') {
        while (typing) await delay(50);
        typing = true;
        const old = document.getElementById('_cur');
        if (old) old.remove();
        console_.appendChild(document.createElement('br'));
        console_.appendChild(document.createTextNode('> '));
        const span = document.createElement('span');
        if (type) span.className = type;
        console_.appendChild(span);
        for (const ch of msg) {
            span.textContent += ch;
            console_.scrollTop = console_.scrollHeight;
            await delay(11);
        }
        const cur = document.createElement('span');
        cur.id = '_cur'; cur.className = 'cursor';
        console_.appendChild(cur);
        console_.scrollTop = console_.scrollHeight;
        typing = false;
    }

    async function getFPS(file) {
        return new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    const buf  = e.target.result;
                    const view = new DataView(buf);
                    const u8   = new Uint8Array(buf);
                    const vide = [0x76,0x69,0x64,0x65];
                    const stsz = [0x73,0x74,0x73,0x7A];
                    let vi = -1;
                    for (let i = 0; i < u8.length - 4; i++)
                        if (u8[i]===vide[0]&&u8[i+1]===vide[1]&&u8[i+2]===vide[2]&&u8[i+3]===vide[3]) { vi=i; break; }
                    if (vi !== -1)
                        for (let i = vi; i < u8.length - 4; i++)
                            if (u8[i]===stsz[0]&&u8[i+1]===stsz[1]&&u8[i+2]===stsz[2]&&u8[i+3]===stsz[3])
                                { resolve(view.getUint32(i+12)); return; }
                    resolve(null);
                } catch { resolve(null); }
            };
            reader.readAsArrayBuffer(file.slice(0, 150*1024*1024));
        });
    }

    uploadZone.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', async e => {
        const file = e.target.files[0];
        if (!file) return;
        selectedFile = file;
        let name = file.name.length > 28 ? file.name.slice(0,25)+'...' : file.name;
        uploadLabel.textContent = name;
        uploadZone.classList.add('has-file');
        await log('Analyzing video binary structure...', '');
        const frames = await getFPS(file);
        const video  = document.createElement('video');
        video.preload = 'metadata';
        video.onloadedmetadata = async () => {
            const mb  = (file.size/1024/1024).toFixed(2);
            const br  = video.duration > 0 ? ((file.size*8)/video.duration/1e6).toFixed(2) : '0';
            const fps = frames && video.duration > 0 ? Math.round(frames/video.duration) : '---';
            document.getElementById('s-res').textContent     = `${video.videoWidth}x${video.videoHeight}`;
            document.getElementById('s-fps').textContent     = `${fps} FPS`;
            document.getElementById('s-bitrate').textContent = `${br} Mbps`;
            document.getElementById('s-size').textContent    = `${mb} MB`;
            startBtn.disabled = false;
            startBtn.classList.add('ready');
            await log(`Target: ${name}`, 'hl');
            await log(`${video.videoWidth}x${video.videoHeight} · ${fps}fps · ${mb}MB`, 'hl');
        };
        video.src = URL.createObjectURL(file);
    });

    startBtn.addEventListener('click', async () => {
        if (!selectedFile) return;
        startBtn.disabled = true;
        startBtn.classList.remove('ready');
        startBtn.textContent = 'Initializing...';
        await log('Loading bypass payload...', '');
        await delay(400);
        try {
            const payload = 0x00780000;
            await log('Payload ready. Processing...', 'suc');
            startBtn.textContent = 'Injecting Payload...';
            await log('Injecting binary payload into elst atom...', '');
            const buf  = await selectedFile.arrayBuffer();
            const dv   = new DataView(buf);
            const u8   = new Uint8Array(buf);
            const elst = [0x65,0x6C,0x73,0x74];
            let idx = -1;
            for (let i = 0; i < u8.length - 4; i++)
                if (u8[i]===elst[0]&&u8[i+1]===elst[1]&&u8[i+2]===elst[2]&&u8[i+3]===elst[3]) { idx=i; break; }
            if (idx === -1) throw new Error("'elst' atom not found in video!");
            dv.setUint32(idx + 8, payload, false);
            const blob = new Blob([buf], { type: selectedFile.type });
            const a    = document.createElement('a');
            a.href     = URL.createObjectURL(blob);
            a.download = selectedFile.name.replace(/\.[^/.]+$/, '') + '_120fps.mp4';
            a.click();
            await log('Bypass payload injected!', 'suc');
            await log('File downloaded — upload to TikTok now.', 'suc');
            startBtn.textContent       = 'Bypass Successful ✓';
            startBtn.style.background  = 'rgba(52,211,153,0.12)';
            startBtn.style.borderColor = '#34d399';
            startBtn.style.color       = '#34d399';
            setTimeout(() => {
                startBtn.textContent   = 'Initialize Calibration';
                startBtn.style.cssText = '';
                startBtn.disabled      = false;
                startBtn.classList.add('ready');
            }, 3500);
        } catch (err) {
            await log('Error: ' + err.message, 'err');
            startBtn.textContent       = 'Error — Retry';
            startBtn.style.background  = 'rgba(254,44,85,0.1)';
            startBtn.style.borderColor = 'rgba(254,44,85,0.5)';
            startBtn.style.color       = '#FE2C55';
            startBtn.disabled          = false;
            setTimeout(() => {
                startBtn.textContent   = 'Initialize Calibration';
                startBtn.style.cssText = '';
                startBtn.classList.add('ready');
            }, 2500);
        }
    });
</script>
